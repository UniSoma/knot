name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BB_VERSION: 1.12.218
  BBIN_VERSION: v0.2.5

jobs:
  test:
    name: bb test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Setup Babashka
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          bb: ${{ env.BB_VERSION }}

      - name: Install bbin
        # knot.serve-integration-test/spawned-server-binds-and-serves
        # spawns `knot serve` and the handler shells out to `knot ... --json`
        # per ADR-0007. The bare `knot` PATH lookup needs an installed binary.
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/bbin" \
            "https://raw.githubusercontent.com/babashka/bbin/${BBIN_VERSION}/bbin"
          chmod +x "$HOME/.local/bin/bbin"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -fsSL -o "$HOME/.local/bin/bbin.bat" \
              "https://raw.githubusercontent.com/babashka/bbin/${BBIN_VERSION}/bbin.bat"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # $GITHUB_PATH only takes effect in subsequent steps, so invoke
          # via the full path here. (Same workaround as release-smoke.yml.)
          "$HOME/.local/bin/bbin" --version

      - name: Install knot from checkout
        run: bbin install . --as knot

      - name: Run tests
        run: bb test
