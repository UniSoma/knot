name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: bb test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Windows currently has known cross-platform test failures (path
    # separators, line endings, console encoding). Tracked in a follow-up
    # knot ticket. Until those are fixed, let the Windows job fail without
    # blocking the workflow conclusion.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Babashka
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          bb: 1.12.218

      - name: Run tests
        run: bb test
